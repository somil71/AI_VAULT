name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Frontend install
        working-directory: frontend
        run: npm install

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Frontend type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Backend install
        working-directory: backend
        run: npm install

      - name: Backend syntax check
        working-directory: backend
        run: find src -name "*.js" -print0 | xargs -0 -n1 node --check

      - name: AI dependencies
        working-directory: ai-service
        run: pip install -r requirements.txt

      - name: AI syntax check
        working-directory: ai-service
        run: find . -name "*.py" -print0 | xargs -0 -n1 python -m py_compile

      - name: Blockchain install
        working-directory: blockchain
        run: npm install

      - name: Blockchain compile
        working-directory: blockchain
        run: npx hardhat compile
