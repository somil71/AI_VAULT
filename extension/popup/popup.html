<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LifeVault AI Guardian</title>
    <style>
        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --teal: #14b8a6;
            --red: #ef4444;
            --text-p: #f9fafb;
            --text-s: #9ca3af;
        }
        body {
            width: 320px;
            margin: 0;
            background: var(--bg);
            color: var(--text-p);
            font-family: 'Inter', system-ui, sans-serif;
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .logo { font-size: 20px; }
        .title { font-weight: 700; font-size: 16px; }
        
        .gauge-container {
            position: relative;
            height: 120px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .gauge-svg {
            transform: rotate(-90deg);
        }
        .gauge-bg { fill: none; stroke: var(--surface); stroke-width: 10; }
        .gauge-fill { 
            fill: none; 
            stroke: var(--teal); 
            stroke-width: 10; 
            stroke-dasharray: 251.2; 
            stroke-dashoffset: 251.2;
            transition: stroke-dashoffset 0.6s ease;
        }
        .gauge-text {
            position: absolute;
            font-size: 24px;
            font-weight: 800;
        }

        .status-card {
            background: var(--surface);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            border: 1px solid #1f2937;
        }
        .status-label { font-size: 12px; color: var(--text-s); margin-bottom: 4px; }
        .status-value { font-weight: 600; }

        .scan-box {
            margin-bottom: 16px;
        }
        textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid #1f2937;
            border-radius: 6px;
            color: var(--text-p);
            padding: 8px;
            font-size: 12px;
            resize: none;
            margin-bottom: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary { background: var(--teal); color: #0a0f1e; }
        .btn-secondary { background: var(--surface); color: var(--text-p); border: 1px solid #1f2937; }
        
        #auth-needed {
            text-align: center;
            padding: 24px;
        }
        .hidden { display: none; }
        
        .threat-list {
            margin-top: 16px;
        }
        .threat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #1f2937;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="main-content">
        <div class="header">
            <span class="logo">🛡️</span>
            <span class="title">LifeVault Guardian</span>
        </div>

        <div class="gauge-container">
            <svg class="gauge-svg" width="100" height="100">
                <circle class="gauge-bg" cx="50" cy="50" r="40"></circle>
                <circle id="gauge-fill" class="gauge-fill" cx="50" cy="50" r="40"></circle>
            </svg>
            <div id="gauge-val" class="gauge-text">--</div>
        </div>

        <div class="status-card">
            <div class="status-label">Current Site Status</div>
            <div id="site-status" class="status-value">Scanning...</div>
        </div>

        <div class="scan-box">
            <textarea id="scan-input" placeholder="Paste URL or message to analyze..." rows="3"></textarea>
            <button id="manual-scan" class="btn-primary">Analyze Now</button>
        </div>

        <div class="threat-list">
            <div class="status-label">Recent Blocked Threats</div>
            <div id="threat-history"></div>
        </div>
    </div>

    <div id="auth-needed" class="hidden">
        <div style="font-size: 40px; margin-bottom: 16px;">🔐</div>
        <p style="margin-bottom: 24px;">Please connect your LifeVault account to enable real-time protection.</p>
        <button id="connect-btn" class="btn-primary">Connect to LifeVault</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
